<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denoiser — Clean your documents</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #161618;
    --border: #272729;
    --accent: #c8f04b;
    --accent-dim: rgba(200, 240, 75, 0.12);
    --text: #f0f0ee;
    --muted: #6b6b70;
    --danger: #ff5e5e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .everything { position: relative; z-index: 1; width: 100%; max-width: 960px; }

  /* Header */
  header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 56px;
  }

  .logo {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo span {
    color: var(--accent);
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* Drop zone */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 16px;
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 52px;
    height: 52px;
    margin: 0 auto 20px;
    border-radius: 14px;
    background: var(--accent-dim);
    border: 1px solid rgba(200, 240, 75, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }

  .drop-zone:hover .drop-icon { transform: translateY(-3px); }

  .drop-icon svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 1.8; }

  .drop-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }

  .drop-sub {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #0d0d0f;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    margin-top: 28px;
    letter-spacing: 0.01em;
  }

  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* Processing state */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.25);
    border-top-color: #0d0d0f;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Preview area */
  .preview-area {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    margin-top: 40px;
    align-items: stretch;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .preview-area.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .preview-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .panel-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 5px;
    letter-spacing: 0.05em;
  }

  .badge-original { background: rgba(255,255,255,0.06); color: var(--muted); }
  .badge-denoised { background: var(--accent-dim); color: var(--accent); }

  .panel-img-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-height: 260px;
  }

  .panel-img-wrap img {
    max-width: 100%;
    max-height: 460px;
    border-radius: 8px;
    display: block;
    image-rendering: crisp-edges;
  }

  .placeholder-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }

  /* Divider arrow */
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
  }

  .arrow-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .arrow-circle svg { width: 18px; height: 18px; stroke: var(--muted); fill: none; stroke-width: 2; }

  /* Download strip */
  .download-strip {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 16px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .download-strip.visible { opacity: 1; }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid rgba(200,240,75,0.3);
    border-radius: 8px;
    padding: 9px 18px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
  }

  .btn-ghost:hover { background: var(--accent-dim); }
  .btn-ghost svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e1e21;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 22px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* File name display */
  .file-name-bar {
    display: none;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .file-name-bar.visible { display: flex; }
  .file-name-bar svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 2; flex-shrink: 0; }
  .file-name-bar span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-clear { margin-left: auto; cursor: pointer; color: var(--muted); transition: color 0.15s; flex-shrink: 0; }
  .file-clear:hover { color: var(--danger); }
</style>
</head>
<body>
<div class="everything">

  <header>
    <div class="logo">de<span>noise</span></div>
    <div class="tagline">// document clarity engine</div>
  </header>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="drop-title">Drop your document here</div>
    <div class="drop-sub">PNG, JPG, WEBP — or click to browse</div>
  </div>

  <!-- File name bar -->
  <div class="file-name-bar" id="fileNameBar">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span id="fileNameText"></span>
    <div class="file-clear" id="fileClear" title="Remove file">
      <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>

  <div style="text-align:center">
    <button class="btn" id="denoiseBtn" disabled onclick="runDenoise()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
      Run Denoiser
    </button>
  </div>

  <!-- Preview -->
  <div class="preview-area" id="previewArea">
    <div class="preview-panel">
      <div class="panel-header">
        <span class="panel-label">Original</span>
        <span class="panel-badge badge-original">INPUT</span>
      </div>
      <div class="panel-img-wrap">
        <img id="originalImg" style="display:none">
        <div class="placeholder-text" id="origPlaceholder">Your document<br>will appear here</div>
      </div>
    </div>

    <div class="divider">
      <div class="arrow-circle">
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </div>

    <div class="preview-panel">
      <div class="panel-header">
        <span class="panel-label">Denoised</span>
        <span class="panel-badge badge-denoised">OUTPUT</span>
      </div>
      <div class="panel-img-wrap" id="denoisedWrap">
        <img id="denoisedImg" style="display:none">
        <div class="placeholder-text" id="denoisedPlaceholder">Cleaned result<br>will appear here</div>
      </div>
    </div>
  </div>

  <!-- Download bar -->
  <div class="download-strip" id="downloadStrip">
    <a class="btn-ghost" id="downloadBtn" href="#" download="denoised.png">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download result
    </a>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const denoiseBtn = document.getElementById('denoiseBtn');
  const originalImg = document.getElementById('originalImg');
  const denoisedImg = document.getElementById('denoisedImg');
  const previewArea = document.getElementById('previewArea');
  const downloadStrip = document.getElementById('downloadStrip');
  const downloadBtn = document.getElementById('downloadBtn');
  const fileNameBar = document.getElementById('fileNameBar');
  const fileNameText = document.getElementById('fileNameText');
  const origPlaceholder = document.getElementById('origPlaceholder');
  const denoisedPlaceholder = document.getElementById('denoisedPlaceholder');
  const fileClear = document.getElementById('fileClear');
  const toast = document.getElementById('toast');

  let toastTimer;

  function showToast(msg, isError = false) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = 'toast' + (isError ? ' error' : '') + ' show';
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function setFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      showToast('Please upload an image file.', true);
      return;
    }
    fileNameText.textContent = file.name;
    fileNameBar.classList.add('visible');
    denoiseBtn.disabled = false;

    const reader = new FileReader();
    reader.onload = e => {
      originalImg.src = e.target.result;
      originalImg.style.display = 'block';
      origPlaceholder.style.display = 'none';
      previewArea.classList.add('visible');
      // Reset denoised
      denoisedImg.style.display = 'none';
      denoisedPlaceholder.style.display = 'block';
      downloadStrip.classList.remove('visible');
    };
    reader.readAsDataURL(file);
  }

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  fileClear.addEventListener('click', () => {
    fileInput.value = '';
    fileNameBar.classList.remove('visible');
    denoiseBtn.disabled = true;
    originalImg.style.display = 'none';
    origPlaceholder.style.display = 'block';
    denoisedImg.style.display = 'none';
    denoisedPlaceholder.style.display = 'block';
    previewArea.classList.remove('visible');
    downloadStrip.classList.remove('visible');
  });

  // Drag and drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });

  async function runDenoise() {
    const file = fileInput.files[0];
    if (!file) return;

    // Loading state
    denoiseBtn.disabled = true;
    denoiseBtn.innerHTML = '<div class="spinner"></div> Processing…';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/denoise', { method: 'POST', body: formData });
      if (!res.ok) throw new Error('Server error ' + res.status);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      denoisedImg.src = url;
      denoisedImg.style.display = 'block';
      denoisedPlaceholder.style.display = 'none';
      downloadBtn.href = url;
      downloadStrip.classList.add('visible');
      showToast('✓ Denoising complete');
    } catch (err) {
      showToast('Request failed — is the server running?', true);
    } finally {
      denoiseBtn.disabled = false;
      denoiseBtn.innerHTML = `
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
        Run Denoiser`;
    }
  }
</script>
</body>
</html>
